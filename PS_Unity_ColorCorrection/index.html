<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS → Unity Color Correction</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="panel-title">PS → Unity Linear 校正「</div>
    <div class="panel-subtitle">Color Space Correction for Unity Linear</div>

    <!-- Parameters Section -->
    <div class="section">
        <div class="section-header">校正參數 Parameters</div>

        <div class="param-row">
            <span class="param-label">Gamma 值</span>
            <input type="range" class="param-slider" id="sliderGamma" min="1.8" max="2.4" step="0.05" value="2.2">
            <span class="param-value" id="valGamma">2.20</span>
        </div>

        <div class="param-row">
            <span class="param-label">RGB 校正強度</span>
            <input type="range" class="param-slider" id="sliderRGB" min="0" max="150" step="1" value="100">
            <span class="param-value" id="valRGB">100%</span>
        </div>

        <div class="param-row">
            <span class="param-label">Alpha 校正強度</span>
            <input type="range" class="param-slider" id="sliderAlpha" min="0" max="150" step="1" value="100">
            <span class="param-value" id="valAlpha">100%</span>
        </div>

        <div class="param-row">
            <span class="param-label">ASTC 補償強度</span>
            <input type="range" class="param-slider" id="sliderASTC" min="0" max="30" step="1" value="10">
            <span class="param-value" id="valASTC">10%</span>
        </div>
    </div>

    <!-- One-Click Correction -->
    <div class="section">
        <div class="section-header">一鍵校正 Correct</div>
        <button class="btn btn-primary" id="btnCorrect" onclick="doCorrection()">
            ▶ 校正當前文件 Correct Current File
        </button>
        <div class="status-bar" id="statusCorrect"></div>
    </div>

    <!-- Unity Preview -->
    <div class="section">
        <div class="section-header">Unity Linear 預覽 Preview</div>
        <div class="toggle-row">
            <span class="toggle-label">模擬 Unity Linear 渲染</span>
            <label class="toggle-switch">
                <input type="checkbox" id="togglePreview" onchange="toggleLinearPreview()">
                <span class="toggle-track"></span>
            </label>
        </div>
        <div class="status-bar" id="statusPreview"></div>
    </div>

    <!-- Batch Processing -->
    <div class="section">
        <div class="section-header">批次處理 Batch Process</div>

        <button class="btn btn-secondary" id="btnSelectInput" onclick="selectInputFolder()">
            📂 選擇輸入資料夾 Select Input
        </button>
        <div class="folder-path" id="pathInput">未選擇 Not selected</div>

        <div style="height: 4px;"></div>

        <button class="btn btn-secondary" id="btnSelectOutput" onclick="selectOutputFolder()">
            📂 選擇輸出資料夾 Select Output
        </button>
        <div class="folder-path" id="pathOutput">未選擇 Not selected</div>

        <div style="height: 6px;"></div>

        <button class="btn btn-primary" id="btnBatch" onclick="doBatchProcess()">
            ▶ 開始批次處理 Start Batch
        </button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0 / 0</div>
        </div>

        <div class="status-bar" id="statusBatch"></div>
    </div>

    <!-- Reset -->
    <div class="section">
        <button class="btn btn-secondary" onclick="resetParams()">
            ↺ 重置參數 Reset Parameters
        </button>
    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
